<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Meadow Connection Manager — Bookstore Example</title>

	<style id="PICT-CSS"></style>
	<style>
		*, *::before, *::after { box-sizing: border-box; }

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			margin: 0;
			padding: 20px;
			background: var(--theme-color-background-secondary, #f5f5f5);
			color: var(--theme-color-text-primary, #1a1a1a);
		}

		h1 { margin-top: 0; }

		/* ── MCM component styles ──────────────────────────── */

		.mcm-connection-list {
			background: var(--theme-color-background-panel, #fff);
			border: 1px solid var(--theme-color-border-default, #ddd);
			border-radius: 6px;
			padding: 16px;
			margin-bottom: 20px;
		}

		.mcm-list-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 12px;
		}

		.mcm-list-header h3 { margin: 0; }

		.mcm-connection-row {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 8px 12px;
			border: 1px solid var(--theme-color-border-light, #eee);
			border-radius: 4px;
			margin-bottom: 6px;
			background: var(--theme-color-background-secondary, #fafafa);
		}

		.mcm-conn-name { font-weight: 600; min-width: 160px; }
		.mcm-conn-type { color: var(--theme-color-text-secondary, #666); min-width: 100px; }
		.mcm-conn-status { color: var(--theme-color-text-muted, #888); min-width: 80px; font-size: 0.9em; }
		.mcm-conn-actions { margin-left: auto; display: flex; gap: 6px; }

		.mcm-connection-detail {
			background: var(--theme-color-background-panel, #fff);
			border: 1px solid var(--theme-color-border-default, #ddd);
			border-radius: 6px;
			padding: 16px;
			margin-bottom: 20px;
		}

		.mcm-detail-header h3 { margin: 0 0 12px 0; }

		.mcm-detail-form {
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.mcm-detail-actions {
			display: flex;
			gap: 8px;
			margin-top: 12px;
			padding-top: 12px;
			border-top: 1px solid var(--theme-color-border-light, #eee);
		}

		.mcm-config-fields {
			display: flex;
			flex-direction: column;
			gap: 8px;
			padding: 12px;
			background: var(--theme-color-background-secondary, #f9f9f9);
			border: 1px solid var(--theme-color-border-light, #eee);
			border-radius: 4px;
		}

		.mcm-field {
			display: flex;
			flex-direction: column;
			gap: 4px;
		}

		.mcm-field-label {
			font-size: 0.85em;
			font-weight: 600;
			color: var(--theme-color-text-secondary, #444);
		}

		.mcm-field-help {
			font-size: 0.8em;
			color: var(--theme-color-text-muted, #888);
		}

		.mcm-field input, .mcm-field select {
			padding: 6px 10px;
			border: 1px solid var(--theme-color-border-default, #ccc);
			border-radius: 4px;
			font-size: 0.95em;
		}

		/* ── Buttons ───────────────────────────────────────── */

		.mcm-btn {
			padding: 6px 14px;
			border: 1px solid var(--theme-color-border-default, #ccc);
			border-radius: 4px;
			background: var(--theme-color-background-panel, #fff);
			cursor: pointer;
			font-size: 0.9em;
		}

		.mcm-btn:hover { background: var(--theme-color-background-tertiary, #f0f0f0); }

		.mcm-btn-primary {
			background: var(--theme-color-brand-primary, #2563eb);
			color: var(--theme-color-background-panel, #fff);
			border-color: var(--theme-color-brand-primary, #2563eb);
		}

		.mcm-btn-primary:hover { background: var(--theme-color-brand-primary-hover, #1d4ed8); }

		.mcm-btn-add {
			background: var(--theme-color-status-success, #16a34a);
			color: var(--theme-color-background-panel, #fff);
			border-color: var(--theme-color-status-success, #16a34a);
		}

		.mcm-btn-add:hover { background: var(--theme-color-status-success, #15803d); }

		.mcm-btn-danger {
			color: var(--theme-color-status-error, #dc2626);
			border-color: var(--theme-color-status-error, #dc2626);
		}

		.mcm-btn-danger:hover { background: #fef2f2; }
	</style>
</head>
<body>

	<h1>Meadow Connection Manager</h1>
	<p>Manage connections to the bookstore test databases. Start the Docker containers with <code>docker compose up -d</code> then test connectivity below.</p>

	<div id="MCM-ConnectionList-Container"></div>
	<div id="MCM-ConnectionDetail-Container"></div>

	<script src="/js/pict.min.js"></script>
	<script src="/js/app.js"></script>
	<script>
		Pict.safeOnDocumentReady(
			function ()
			{
				Pict.safeLoadPictApplication(PictMcmExampleBookstoreConnections, 1);
			});
	</script>

</body>
</html>
